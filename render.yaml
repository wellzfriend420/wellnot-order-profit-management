services:
  - type: web
    name: wellnot-order-profit-management
    runtime: node
    region: singapore
    plan: starter
    branch: main
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm start
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    numInstances: 1
    envVars:
      - key: NODE_VERSION
        value: 22.18.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/wellnot/wellnot.sqlite
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: WORKER_INITIAL_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: HOURLY_RATE
        value: "0"
      - key: BACKUP_INTERVAL_HOURS
        value: "24"
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_DRIVE_BACKUP_FOLDER_ID
        sync: false
    disk:
      name: wellnot-data
      mountPath: /var/data
      sizeGB: 1
